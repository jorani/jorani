services:
  jorani:
    env_file: .env
    volumes:
      - .:/var/www/html
    depends_on:
      - composer
  composer:
    image: composer:latest
    volumes:
      - .:/app
    command: install --working-dir=/app/legacy --ignore-platform-reqs
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "${SMTP_PORT}:${SMTP_PORT}"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
